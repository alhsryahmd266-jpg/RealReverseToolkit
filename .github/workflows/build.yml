name: PHANTOM RE — Build & Sign APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Build Tools
      run: |
        sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>/dev/null || true
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

    - name: Install dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Add Android Platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Write Complete AndroidManifest.xml
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">

            <!-- ═══ NETWORK ═══ -->
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
            <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE" />
            <uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />

            <!-- ═══ STORAGE ═══ -->
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />

            <!-- ═══ PACKAGE MANAGEMENT ═══ -->
            <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
            <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
            <uses-permission android:name="android.permission.REQUEST_DELETE_PACKAGES" />

            <!-- ═══ SYSTEM ═══ -->
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
            <uses-permission android:name="android.permission.VIBRATE" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />

            <!-- ═══ HARDWARE ═══ -->
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />

            <!-- ═══ PHONE ═══ -->
            <uses-permission android:name="android.permission.READ_PHONE_STATE" />
            <uses-permission android:name="android.permission.READ_PHONE_NUMBERS" />
            <uses-permission android:name="android.permission.PACKAGE_USAGE_STATS" />

            <!-- ═══ ACCESSIBILITY ═══ -->
            <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />

            <!-- ═══ FEATURES ═══ -->
            <uses-feature android:name="android.hardware.camera" android:required="false" />
            <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />
            <uses-feature android:name="android.software.vpn" android:required="false" />

            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="PHANTOM RE"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/AppTheme"
                android:requestLegacyExternalStorage="true"
                android:usesCleartextTraffic="true"
                android:networkSecurityConfig="@xml/network_security_config"
                android:hardwareAccelerated="true">

                <activity
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                    android:exported="true"
                    android:hardwareAccelerated="true"
                    android:label="PHANTOM RE"
                    android:launchMode="singleTask"
                    android:name="com.getcapacitor.BridgeActivity"
                    android:windowSoftInputMode="adjustResize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="${applicationId}.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>

            </application>
        </manifest>
        MANIFEST_EOF
        echo "✅ AndroidManifest.xml written"
        cat android/app/src/main/AndroidManifest.xml | head -5

    - name: Create Network Security Config
      run: |
        mkdir -p android/app/src/main/res/xml
        cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <network-security-config>
            <base-config cleartextTrafficPermitted="true">
                <trust-anchors>
                    <certificates src="system" />
                    <certificates src="user" />
                </trust-anchors>
            </base-config>
        </network-security-config>
        EOF

    - name: Create File Provider Paths
      run: |
        mkdir -p android/app/src/main/res/xml
        cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-path name="external_files" path="." />
            <files-path name="internal_files" path="." />
            <cache-path name="cache_files" path="." />
        </paths>
        EOF

    - name: Set App Info in build.gradle
      run: |
        sed -i 's/applicationId ".*"/applicationId "com.phantomre.toolkit"/' android/app/build.gradle || true
        sed -i 's/versionCode [0-9]*/versionCode '"$GITHUB_RUN_NUMBER"'/' android/app/build.gradle || true
        sed -i 's/versionName "[^"]*"/versionName "1.'"$GITHUB_RUN_NUMBER"'.0"/' android/app/build.gradle || true
        echo "✅ build.gradle updated"

    - name: Update strings.xml
      run: |
        cat > android/app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">PHANTOM RE</string>
            <string name="title_activity_main">PHANTOM RE</string>
            <string name="package_name">com.phantomre.toolkit</string>
            <string name="custom_url_scheme">phantomre</string>
        </resources>
        EOF

    - name: Generate Release Keystore (RSA-4096)
      run: |
        keytool -genkey -v \
          -keystore phantom-release.jks \
          -alias phantom \
          -keyalg RSA \
          -keysize 4096 \
          -validity 36500 \
          -storepass phantom2024RE \
          -keypass phantom2024RE \
          -dname "CN=PHANTOM RE, OU=Security, O=PhantomRE, L=Cairo, ST=Cairo, C=EG"
        echo "✅ RSA-4096 Keystore generated (100 years validity)"

    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/phantom-release.jks \
          -Pandroid.injected.signing.store.password=phantom2024RE \
          -Pandroid.injected.signing.key.alias=phantom \
          -Pandroid.injected.signing.key.password=phantom2024RE \
          --no-daemon \
          --stacktrace

    - name: Zipalign APK
      run: |
        APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
        echo "APK: $APK — size: $(ls -lh $APK | awk '{print $5}')"
        $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$APK" PHANTOM-RE-aligned.apk
        echo "✅ Zipalign done"

    - name: Sign APK with apksigner
      run: |
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
          --ks phantom-release.jks \
          --ks-key-alias phantom \
          --ks-pass pass:phantom2024RE \
          --key-pass pass:phantom2024RE \
          --out PHANTOM-RE-SIGNED.apk \
          PHANTOM-RE-aligned.apk
        echo "✅ APK signed with RSA-4096"

    - name: Verify Signature
      run: |
        $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose PHANTOM-RE-SIGNED.apk
        echo ""
        echo "══════════════════════════════════"
        echo "  PHANTOM RE APK — READY"
        ls -lh PHANTOM-RE-SIGNED.apk
        echo "══════════════════════════════════"

    - name: Upload Signed APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PHANTOM-RE-v${{ github.run_number }}-SIGNED
        path: PHANTOM-RE-SIGNED.apk
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "PHANTOM RE v${{ github.run_number }} — موقّع رقمياً RSA-4096"
        body: |
          ## ⚡ PHANTOM RE v${{ github.run_number }}
          **أقوى منظومة هندسة عكسية على الإطلاق**

          ### المميزات:
          - 🔬 تحليل APK ستاتيكي كامل (ZIP + AXML + DEX parsers في JS)
          - ⚡ سير عمل كامل: فك ← تعديل ← بناء ← توقيع
          - 💉 حقن Frida Gadget بدون Root
          - 🌐 اعتراض HTTPS عبر VPN (بثق شهادات المستخدم)
          - 🖥️ بريدج PC (jadx, Ghidra, radare2)
          - 🔒 31 صلاحية Android (QUERY_ALL_PACKAGES, SYSTEM_ALERT_WINDOW...)

          ### التوقيع الرقمي:
          - **خوارزمية:** RSA 4096-bit
          - **صلاحية:** 100 سنة
          - **مُتحقق بـ:** apksigner

          ### التثبيت:
          1. حمّل `PHANTOM-RE-SIGNED.apk`
          2. فعّل "مصادر غير معروفة" في الإعدادات
          3. ثبّت وشغّل
        files: PHANTOM-RE-SIGNED.apk
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
